<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8def"/>
      <stop offset="1" stop-color="#2f6fed"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background so the icon also works as a maskable icon. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Curly braces { } centred within the maskable safe zone (~20% padding). -->
  <g fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <path d="M205 140
             c-34 0 -42 18 -42 52
             c0 30 2 50 -30 64
             c32 14 30 34 30 64
             c0 34 8 52 42 52"/>
    <path d="M307 140
             c34 0 42 18 42 52
             c0 30 -2 50 30 64
             c-32 14 -30 34 -30 64
             c0 34 -8 52 -42 52"/>
  </g>
  <!-- Centre dot, echoing a JSON value. -->
  <circle cx="256" cy="256" r="20" fill="#ffffff"/>
</svg>
