<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Thomas Chaplin">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A fast, free tool to format, minify, validate, copy and download JSON and JSON5.">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#eef1f6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0c0f16" media="(prefers-color-scheme: dark)">
    <title>JSON Tools — Format, Minify & Validate JSON / JSON5</title>
    <link rel="canonical" href="https://json.thomaschaplin.me/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="JSON Tools">
    <meta property="og:title" content="JSON Tools — Format, Minify & Validate JSON / JSON5">
    <meta property="og:description" content="A fast, free tool to format, minify, validate, copy and download JSON and JSON5. Everything runs in your browser — your data never leaves your machine.">
    <meta property="og:url" content="https://json.thomaschaplin.me/">
    <meta property="og:image" content="https://json.thomaschaplin.me/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="JSON Tools — format, minify and validate JSON or JSON5 in your browser.">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="JSON Tools — Format, Minify & Validate JSON / JSON5">
    <meta name="twitter:description" content="A fast, free tool to format, minify, validate, copy and download JSON and JSON5. Runs entirely in your browser.">
    <meta name="twitter:image" content="https://json.thomaschaplin.me/og-image.png">
    <meta name="twitter:image:alt" content="JSON Tools — format, minify and validate JSON or JSON5 in your browser.">

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/gif" sizes="16x16">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "JSON Tools",
        "url": "https://json.thomaschaplin.me/",
        "description": "A fast, free tool to format, minify, validate, copy and download JSON and JSON5. Everything runs in your browser — your data never leaves your machine.",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript and a modern browser.",
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        },
        "author": {
            "@type": "Person",
            "name": "Thomas Chaplin"
        },
        "featureList": [
            "Pretty print JSON and JSON5",
            "Minify JSON and JSON5",
            "Validate JSON and JSON5",
            "Copy to clipboard",
            "Download as a file",
            "Drag and drop files",
            "Light and dark theme"
        ]
    }
    </script>
</head>

<body>
    <div class="ambient" aria-hidden="true"></div>

    <a class="skip-link" href="#jsonField">Skip to editor</a>

    <div class="app">
        <header class="app-header">
            <h1 class="app-title">JSON Tools</h1>
            <button type="button" id="themeToggle" class="icon-button" aria-label="Toggle colour theme" title="Toggle theme">
                <span class="theme-icon" aria-hidden="true"></span>
            </button>
        </header>

        <p class="app-subtitle">Format, minify and validate <strong>JSON</strong> or <strong>JSON5</strong> &mdash; right in your browser.</p>

        <div class="toolbar">
            <fieldset class="mode-toggle" aria-label="Format mode">
                <legend class="visually-hidden">Format mode</legend>
                <label class="mode-option">
                    <input type="radio" name="mode" value="json" checked>
                    <span>JSON</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="mode" value="json5">
                    <span>JSON5</span>
                </label>
            </fieldset>

            <div class="actions">
                <button type="button" class="button" data-action="pretty" disabled>Pretty Print</button>
                <button type="button" class="button" data-action="minify" disabled>Minify</button>
                <button type="button" class="button" data-action="validate" disabled>Validate</button>
                <button type="button" class="button" data-action="copy" disabled>Copy</button>
                <button type="button" class="button" data-action="download" disabled>Download</button>
                <button type="button" class="button button-ghost" data-action="clear" disabled>Clear</button>
            </div>
        </div>

        <div class="editor" id="dropZone">
            <textarea class="editor-input" id="jsonField" autocomplete="off" autocorrect="off"
                autocapitalize="off" spellcheck="false"
                placeholder="Paste, type, or drop a JSON / JSON5 file here&hellip;"></textarea>
            <div class="drop-overlay" aria-hidden="true">Drop file to load</div>
        </div>

        <footer class="app-footer">
            <a href="https://ko-fi.com/A0A4MCB0" target="_blank" rel="noopener">
                <img height="36" style="border:0;height:36px;" src="https://az743702.vo.msecnd.net/cdn/kofi5.png?v=0"
                    alt="Buy Me a Coffee at ko-fi.com" loading="lazy" />
            </a>
        </footer>
    </div>

    <div id="toasts" class="toasts" role="status" aria-live="polite" aria-atomic="false"></div>

    <script type="module" src="main.js"></script>
</body>

</html>
